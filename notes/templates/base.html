<!DOCTYPE html>
<html>
<head>
    <title>Sticky Notes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
        }

        .dark-mode {
            background-color: #121212;
            color: white;
        }

        .note-card {
            border-radius: 15px;
            padding: 15px;
            margin: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">📝 Sticky Notes</span>

    <div>
        <a href="/notes/" class="btn btn-light btn-sm">Home</a>

        <button onclick="toggleDarkMode()" class="btn btn-warning btn-sm">🌙</button>

        {% if user.is_authenticated %}
            <form action="/logout/" method="post" style="display:inline;">
                {% csrf_token %}
                <button class="btn btn-danger btn-sm">Logout</button>
            </form>
        {% else %}
            <a href="/login/" class="btn btn-success btn-sm">Login</a>
            <a href="/notes/register/" class="btn btn-primary btn-sm">Register</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
