{% extends 'base.html' %}
{% block content %}

<h2>Delete Note</h2>

<div class="card p-3 shadow">
    <p>Are you sure you want to delete this note?</p>

    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger">Delete</button>
        <a href="{% url 'note_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
